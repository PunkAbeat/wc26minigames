<!DOCTYPE html>
<!-- app-icon artwork; tools/gen-icons.mjs screenshots this at 512/192/180.
     Viewport units throughout so one file renders every size. -->
<html>
<head>
<meta charset="utf-8" />
<style>
  html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden}
  body{background:linear-gradient(160deg,#0f6b3e 0%,#0a5230 45%,#053a22 100%);position:relative}
  /* warm stadium glow from the top */
  .glow{position:absolute;inset:0;background:radial-gradient(70vw 40vh at 50% -8%, rgba(255,226,140,.34), transparent 70%)}
  /* pitch centre-circle markings, off-centre for depth */
  .cc{position:absolute;left:50%;top:108%;width:150vw;height:150vw;transform:translate(-50%,-50%);
    border:1.4vw solid rgba(255,255,255,.16);border-radius:50%}
  .cc2{position:absolute;left:50%;top:108%;width:108vw;height:108vw;transform:translate(-50%,-50%);
    border:1.4vw solid rgba(255,255,255,.10);border-radius:50%}
  /* the gold ball */
  .ball{position:absolute;left:50%;top:46%;width:56vw;height:56vw;transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle at 36% 30%,#fff,#ffe9a6 42%,#ffd23f 74%,#e0a400);
    box-shadow:0 6vw 14vw -4vw rgba(0,0,0,.55), inset 0 -3vw 7vw rgba(0,0,0,.20)}
  /* tiny specular dot */
  .spec{position:absolute;left:39%;top:33%;width:7vw;height:7vw;border-radius:50%;
    background:rgba(255,255,255,.9);filter:blur(1.2vw)}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="cc"></div>
  <div class="cc2"></div>
  <div class="ball"></div>
  <div class="spec"></div>
</body>
</html>
