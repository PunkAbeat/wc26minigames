<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>SQUAD — feel mock v2</title>
<style>
  /* Feel mock only — disposable. Stats are approximate placeholders.
     v2 after owner gut check: visible rival identity, football scoring,
     reveal choreography, sudden death, rank chips. */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font: 16px/1.35 "Nunito", -apple-system, "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #87ceeb 0%, #b8e6f5 55%, #7ec850 55.5%, #5cb83c 100%);
    color: #1d2733;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100dvh; overflow-x: hidden;
    padding: env(safe-area-inset-top) 10px calc(10px + env(safe-area-inset-bottom));
    user-select: none; -webkit-user-select: none;
  }
  body.shake { animation: shake .4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px); }
    40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(3px); }
  }
  header { text-align: center; padding: 6px 0 0; }
  .kicker { font-size: 11px; letter-spacing: 2px; font-weight: 800; color: #2c5e1a; text-transform: uppercase; }
  h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 1px; color: #14324f; }

  .scoreboard {
    display: flex; align-items: center; gap: 10px; margin: 6px 0 2px;
    background: #14324f; color: #fff; border-radius: 12px; padding: 6px 16px;
    box-shadow: 0 4px 10px #0004;
  }
  .scoreboard .team { font-size: 12px; font-weight: 800; letter-spacing: 1px; color: #9fb6cc; }
  .scoreboard b { font-size: 30px; font-weight: 900; min-width: 26px; text-align: center; transition: transform .2s; }
  .scoreboard b.bump { transform: scale(1.45); color: #ffd34d; }
  .scoreboard .dash { color: #5a7a99; font-weight: 900; }
  .dots { display: flex; gap: 6px; justify-content: center; margin: 4px 0 0; }
  .dots i { width: 13px; height: 13px; border-radius: 50%; background: #ffffff80; border: 2px solid #14324f40; font-style: normal; }
  .dots i.w { background: #ffd34d; border-color: #c79a00; }
  .dots i.l { background: #14324f; border-color: #14324f; }
  .dots i.t { background: #b9c4cf; border-color: #8795a3; }

  .prompt {
    min-height: 44px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14.5px; color: #14324f; text-align: center; padding: 0 8px;
  }
  .prompt .rivalcall { color: #a8233d; }
  .prompt .late { color: #a8233d; }

  .table { display: flex; gap: 12px; justify-content: center; align-items: flex-start; min-height: 256px; perspective: 900px; }
  .slot { width: min(44vw, 175px); }
  .slotlabel { text-align: center; font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #ffffffd9; text-shadow: 0 1px 2px #0003; margin-bottom: 4px; }

  .card3d { position: relative; width: 100%; aspect-ratio: 5/7; transform-style: preserve-3d; transition: transform .55s cubic-bezier(.2,.7,.3,1.1); }
  .card3d.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 14px; box-shadow: 0 6px 16px #0003; overflow: hidden;
  }
  .face.front { background: #fff; transform: rotateY(180deg); display: flex; flex-direction: column; }
  .face.back {
    background: linear-gradient(160deg, #14324f, #1c4067);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    border: 3px solid #fff; color: #fff; text-align: center; padding: 10px;
  }
  .face.back img { width: 56px; height: 39px; object-fit: cover; border-radius: 4px; box-shadow: 0 2px 6px #0006; }
  .face.back .nm { font-weight: 900; font-size: 15px; }
  .face.back .hidden { font-size: 11px; font-weight: 700; color: #9fb6cc; letter-spacing: 1px; }
  .mine .face.front { transform: none; }
  .mine .face.back { transform: rotateY(180deg); }

  .cardhead { display: flex; align-items: center; gap: 6px; padding: 8px 9px 5px; background: #f2f6fa; }
  .cardhead img { width: 30px; height: 21px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 2px #0003; }
  .cardhead .nm { font-weight: 900; font-size: 13.5px; line-height: 1.1; }
  .stats { flex: 1; display: flex; flex-direction: column; padding: 4px 5px 7px; gap: 2px; }
  .stat {
    flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 4px;
    border: 0; background: none; font: inherit; text-align: left;
    border-radius: 8px; padding: 2px 7px; font-size: 12.5px; color: #1d2733;
    transition: opacity .3s, transform .3s;
  }
  .stat .lab { font-weight: 700; color: #5a6b7d; }
  .stat .val { font-weight: 900; white-space: nowrap; }
  .stat .rank { font-size: 9.5px; font-weight: 900; color: #fff; background: #5a6b7d; border-radius: 999px; padding: 1px 6px; opacity: 0; transition: opacity .25s; }
  .stat .rank.top { background: #c79a00; }
  .stat .rank.show { opacity: 1; }
  .stat.pickable { background: #eef4fb; box-shadow: inset 0 0 0 1.5px #b9d4ef; cursor: pointer; }
  .stat.pickable:active { background: #dcebfa; }
  .stat.chosen { background: #ffd34d; box-shadow: inset 0 0 0 2px #c79a00; }
  .stat.chosen .lab { color: #6b5200; }
  .stats.duel .stat:not(.contest) { opacity: .18; }
  .stat.contest { transform: scale(1.07); background: #fff8e1; box-shadow: inset 0 0 0 2px #c79a00; }
  .stat.contest .val { font-size: 15px; }
  .stat.win  { background: #c9efbe !important; box-shadow: inset 0 0 0 2.5px #4f9b38 !important; }
  .stat.lose { background: #f6cfd6 !important; box-shadow: inset 0 0 0 2.5px #b04a5e !important; }

  .flash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 50;
  }
  .flash span {
    font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 3px 10px #0006;
    padding: 16px 30px; border-radius: 18px;
    transform: scale(.5) rotate(-4deg); opacity: 0;
    transition: transform .28s cubic-bezier(.2,.8,.3,1.5), opacity .22s;
  }
  .flash span.goal { background: #2c8c1de8; }
  .flash span.bad  { background: #a8233de8; }
  .flash span.meh  { background: #14324fe0; font-size: 30px; }
  .flash.show span { transform: scale(1) rotate(-4deg); opacity: 1; }

  .handwrap { margin-top: auto; width: 100%; max-width: 460px; }
  .handlabel { text-align: center; font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #ffffffd9; text-shadow: 0 1px 2px #0003; margin-bottom: 5px; }
  .hand { display: flex; gap: 7px; justify-content: center; padding-bottom: 4px; }
  .hcard {
    width: 64px; aspect-ratio: 5/7; border-radius: 10px; background: #fff; border: 0;
    box-shadow: 0 4px 10px #0003; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; font: inherit; cursor: pointer; transition: transform .18s, opacity .3s; padding: 4px;
  }
  .hcard img { width: 36px; height: 25px; object-fit: cover; border-radius: 3px; box-shadow: 0 1px 2px #0003; }
  .hcard .nm { font-size: 9.5px; font-weight: 800; text-align: center; line-height: 1.1; }
  .hcard:disabled { opacity: 0; pointer-events: none; }
  .hand.active .hcard:not(:disabled) { animation: bounce 1.2s ease-in-out infinite; }
  .hand.active .hcard:active { transform: translateY(-6px) scale(1.06); }
  .hand:not(.active) .hcard { filter: saturate(.55); }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @media (prefers-reduced-motion: reduce) {
    .hand.active .hcard { animation: none; }
    .card3d { transition: none; }
    body.shake { animation: none; }
  }

  .conf { position: fixed; top: -30px; z-index: 55; font-size: 22px; pointer-events: none; }

  .end {
    position: fixed; inset: 0; background: #14324fcc; z-index: 60;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .end.show { display: flex; }
  .endcard { background: #fff; border-radius: 18px; padding: 24px 30px; text-align: center; max-width: 330px; box-shadow: 0 10px 30px #0006; }
  .endcard .ft { font-size: 12px; font-weight: 900; letter-spacing: 3px; color: #5a6b7d; }
  .endcard .big { font-size: 44px; }
  .endcard h2 { margin: 6px 0 2px; font-size: 24px; font-weight: 900; color: #14324f; }
  .endcard .line { font-size: 30px; font-weight: 900; color: #14324f; margin: 2px 0 6px; }
  .endcard p { margin: 4px 0 16px; color: #5a6b7d; font-weight: 700; font-size: 13.5px; }
  .btn {
    font: inherit; font-weight: 900; font-size: 17px; border: 0; cursor: pointer;
    background: #ffd34d; color: #6b5200; border-radius: 999px; padding: 12px 28px;
    box-shadow: 0 4px 0 #c79a00;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c79a00; }
  footer { font-size: 10.5px; color: #ffffffc4; text-shadow: 0 1px 2px #0003; padding: 6px 0 2px; text-align: center; font-weight: 700; }
</style>
</head>
<body>
  <header>
    <div class="kicker">Matchday · feel mock v2</div>
    <h1>🃏 SQUAD</h1>
  </header>

  <div class="scoreboard">
    <span class="team">YOU</span><b id="sw">0</b><span class="dash">–</span><b id="sl">0</b><span class="team">RIVAL</span>
  </div>
  <div class="dots" id="dots"></div>
  <div class="prompt" id="prompt"></div>

  <div class="table">
    <div class="slot">
      <div class="slotlabel">RIVAL</div>
      <div class="card3d" id="rcard"></div>
    </div>
    <div class="slot">
      <div class="slotlabel">YOU</div>
      <div class="card3d mine" id="mcard"></div>
    </div>
  </div>

  <div class="handwrap">
    <div class="handlabel">YOUR HAND</div>
    <div class="hand" id="hand"></div>
  </div>
  <footer>stats are approximate mock values — not the real game's data</footer>

  <div class="flash" id="flash"><span id="flashtxt"></span></div>
  <div class="end" id="end"><div class="endcard">
    <div class="ft">FULL TIME</div>
    <div class="big" id="endemoji"></div>
    <h2 id="endtitle"></h2>
    <div class="line" id="endline"></div>
    <p id="endsub"></p>
    <button class="btn" id="again">DEAL AGAIN</button>
  </div></div>

<script>
'use strict';
/* name, cc, titles, WC appearances (incl 2026), all-time WC goals, ranking pts, population (M), area (1000 km²)
   — quick agent-authored approximations, good enough to judge feel. */
const N = [
  ["Mexico","mx",0,18,62,1650,130,1964],["South Africa","za",0,4,11,1450,62,1221],
  ["South Korea","kr",0,12,39,1590,52,100],["Czechia","cz",0,9,47,1610,10.9,79],
  ["Canada","ca",0,3,2,1560,40,9985],["Bosnia and Herzegovina","ba",0,2,4,1480,3.2,51],
  ["Qatar","qa",0,2,1,1440,2.7,12],["Switzerland","ch",0,13,50,1640,8.8,41],
  ["Brazil","br",5,23,237,1840,216,8516],["Morocco","ma",0,7,24,1690,37,447],
  ["Haiti","ht",0,2,2,1280,11.7,28],["Scotland","gb-sct",0,9,25,1500,5.5,78],
  ["United States","us",0,12,41,1670,335,9834],["Paraguay","py",0,9,31,1520,6.9,407],
  ["Australia","au",0,7,17,1540,26,7692],["Türkiye","tr",0,3,20,1560,85,784],
  ["Germany","de",4,21,232,1700,84,358],["Curaçao","cw",0,1,0,1300,0.15,0.4],
  ["Ivory Coast","ci",0,4,13,1500,28,322],["Ecuador","ec",0,5,14,1590,18,256],
  ["Netherlands","nl",0,12,96,1740,17.8,42],["Japan","jp",0,8,27,1620,124,378],
  ["Sweden","se",0,13,80,1560,10.5,450],["Tunisia","tn",0,7,14,1500,12.4,164],
  ["Belgium","be",0,15,69,1730,11.7,31],["Egypt","eg",0,4,5,1510,112,1002],
  ["Iran","ir",0,7,13,1610,89,1648],["New Zealand","nz",0,3,2,1300,5.2,268],
  ["Spain","es",1,17,108,1850,48,506],["Cape Verde","cv",0,1,0,1370,0.6,4],
  ["Saudi Arabia","sa",0,7,14,1420,36,2150],["Uruguay","uy",2,15,89,1670,3.4,176],
  ["France","fr",2,17,136,1840,68,552],["Senegal","sn",0,4,12,1620,18,197],
  ["Iraq","iq",0,2,1,1440,45,438],["Norway","no",0,4,7,1620,5.5,385],
  ["Argentina","ar",3,19,152,1860,46,2780],["Algeria","dz",0,5,13,1520,45,2382],
  ["Austria","at",0,8,43,1580,9.1,84],["Jordan","jo",0,1,0,1390,11.3,89],
  ["Portugal","pt",0,9,61,1750,10.5,92],["DR Congo","cd",0,2,0,1440,102,2345],
  ["Uzbekistan","uz",0,1,0,1470,36,449],["Colombia","co",0,7,32,1680,52,1142],
  ["England","gb-eng",1,17,104,1800,56,130],["Croatia","hr",0,7,36,1700,3.9,57],
  ["Ghana","gh",0,5,18,1450,34,239],["Panama","pa",0,2,2,1430,4.4,75],
];
const STATS = [
  ["🏆","World Cup titles", v=>v],
  ["📅","WC appearances", v=>v],
  ["⚽","All-time WC goals", v=>v],
  ["📈","Ranking points", v=>Math.round(v).toLocaleString("en-US")],
  ["👥","Population", v=>v>=1 ? (Math.round(v*10)/10)+"M" : Math.round(v*1000)+"k"],
  ["🗺️","Area", v=>v>=1 ? Math.round(v).toLocaleString("en-US")+"k km²" : Math.round(v*1000)+" km²"],
];
const flagUrl = cc => "https://flagcdn.com/w80/"+cc+".png";

// per stat: percentile (rival brain) and rank "#k of 48" (reveal chips)
const pct  = N.map(row => STATS.map((_,s) => N.filter(o => o[2+s] < row[2+s]).length / N.length));
const rank = N.map(row => STATS.map((_,s) => 1 + N.filter(o => o[2+s] > row[2+s]).length));

const $ = id => document.getElementById(id);
const REGULATION = 5;
let myHand, rivalHand, round, score, busy, sudden;
let results = [];

function deal() {
  const idx = [...N.keys()];
  for (let i = idx.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [idx[i],idx[j]] = [idx[j],idx[i]]; }
  myHand = idx.slice(0,5); rivalHand = idx.slice(5,10);
  round = 1; score = [0,0,0]; results = []; busy = false; sudden = false;
  $("sw").textContent = "0"; $("sl").textContent = "0";
  $("end").classList.remove("show");
  renderDots(); renderHand(); startRound();
}

function renderDots() {
  $("dots").innerHTML = Array.from({length: Math.max(REGULATION, results.length)}, (_,i) =>
    `<i class="${results[i]||""}"></i>`).join("");
}

function renderHand() {
  $("hand").innerHTML = myHand.map(i =>
    `<button class="hcard" data-i="${i}"><img src="${flagUrl(N[i][1])}" alt=""><span class="nm">${N[i][0]}</span></button>`
  ).join("");
  for (const b of $("hand").querySelectorAll(".hcard"))
    b.addEventListener("click", () => { if (!busy && $("hand").classList.contains("active")) playCard(+b.dataset.i); });
}

function cardFront(i, picker) {
  const rows = STATS.map(([em, lab, fmt], s) =>
    `<button class="stat ${picker ? "pickable" : ""}" data-s="${s}">
       <span class="lab">${em} ${lab}</span>
       <span style="display:flex;align-items:center;gap:4px"><span class="rank" data-r="${rank[i][s]}">#${rank[i][s]} of 48</span><span class="val" data-v="${N[i][2+s]}">${fmt(N[i][2+s])}</span></span>
     </button>`).join("");
  return `<div class="face front"><div class="cardhead"><img src="${flagUrl(N[i][1])}" alt=""><span class="nm">${N[i][0]}</span></div>
    <div class="stats">${rows}</div></div>
    <div class="face back"><img src="${flagUrl(N[i][1])}" alt=""><div class="nm">${N[i][0]}</div><div class="hidden">STATS HIDDEN</div></div>`;
}

let rivalCardIdx, rivalStat, myCardIdx;

function startRound() {
  if (!sudden && round > REGULATION) {
    if (score[0] !== score[1]) return endDuel();
    sudden = true; // level after 5 — golden goal, fresh cards
    const used = new Set([...myHand, ...rivalHand]);
    const fresh = [...N.keys()].filter(i => !used.has(i));
    myHand = [fresh[Math.floor(Math.random()*fresh.length)]];
    rivalHand = [fresh.filter(i => i !== myHand[0])[Math.floor(Math.random()*(fresh.length-1))]];
    renderHand();
  }
  myCardIdx = null;
  rivalCardIdx = rivalHand[Math.floor(Math.random()*rivalHand.length)];
  const youPick = sudden || round % 2 === 1;
  rivalStat = null;
  // rival identity is visible before the flip — the read is the game
  $("rcard").className = "card3d";
  $("rcard").innerHTML = cardFront(rivalCardIdx, false);
  $("mcard").innerHTML = `<div class="face front"></div><div class="face back">⚽</div>`;
  $("mcard").className = "card3d mine";
  const late = sudden ? `<b class="late">⚡ GOLDEN GOAL — winner takes it all.</b> `
             : round === REGULATION ? `<b class="late">LAST ROUND${score[0]===score[1] ? " — all level" : ""}!</b> ` : `Round ${round} of ${REGULATION} — `;
  if (youPick) {
    $("prompt").innerHTML = `<span>${late}You face <b>${N[rivalCardIdx][0]}</b>. <b>You pick the stat</b> — choose a card.</span>`;
  } else {
    rivalStat = pct[rivalCardIdx].indexOf(Math.max(...pct[rivalCardIdx]));
    $("prompt").innerHTML = `<span>${late}<b>${N[rivalCardIdx][0]}</b> challenges: <b class="rivalcall">${STATS[rivalStat][0]} ${STATS[rivalStat][1].toUpperCase()}</b>. Choose your card.</span>`;
  }
  $("hand").classList.add("active");
}

function playCard(i) {
  busy = true;
  $("hand").classList.remove("active");
  $("hand").querySelector(`[data-i="${i}"]`).disabled = true;
  myCardIdx = i;
  const youPick = sudden || round % 2 === 1;
  $("mcard").innerHTML = cardFront(i, youPick);
  if (youPick) {
    $("prompt").innerHTML = `<span><b>Pick the stat to beat ${N[rivalCardIdx][0]} with.</b></span>`;
    for (const b of $("mcard").querySelectorAll(".stat"))
      b.addEventListener("click", () => { if (b.classList.contains("pickable")) fight(+b.dataset.s); });
    busy = false;
  } else {
    setTimeout(() => fight(rivalStat), 450);
  }
}

function fight(s) {
  busy = true;
  $("prompt").innerHTML = `<span>${STATS[s][0]} <b>${STATS[s][1].toUpperCase()}</b> it is…</span>`;
  for (const b of $("mcard").querySelectorAll(".stat")) {
    b.classList.remove("pickable");
    if (+b.dataset.s === s) b.classList.add("chosen");
  }
  setTimeout(() => {
    $("rcard").classList.add("flipped");
    setTimeout(() => duel(s), 650);
  }, 350);
}

function duel(s) {
  // choreography: dim everything but the contested stat, count both values up, then verdict
  for (const card of [$("mcard"), $("rcard")]) {
    card.querySelector(".stats").classList.add("duel");
    const row = card.querySelector(`[data-s="${s}"]`);
    row.classList.remove("chosen"); row.classList.add("contest");
    countUp(row.querySelector(".val"), STATS[s][2]);
  }
  setTimeout(() => {
    for (const card of [$("mcard"), $("rcard")]) {
      const chip = card.querySelector(`[data-s="${s}"] .rank`);
      if (+chip.dataset.r <= 3) chip.classList.add("top");
      chip.classList.add("show");
    }
    setTimeout(() => resolve(s), 500);
  }, 750);
}

function countUp(el, fmt) {
  const target = +el.dataset.v, t0 = performance.now(), DUR = 650;
  (function tick(t) {
    const k = Math.min(1, (t - t0) / DUR), ease = 1 - Math.pow(1 - k, 3);
    el.textContent = fmt(target * ease);
    if (k < 1) requestAnimationFrame(tick); else el.textContent = fmt(target);
  })(t0);
}

function resolve(s) {
  const mv = N[myCardIdx][2+s], rv = N[rivalCardIdx][2+s];
  const res = mv > rv ? "w" : mv < rv ? "l" : "t";
  $("mcard").querySelector(`[data-s="${s}"]`).classList.add(res === "w" ? "win" : res === "l" ? "lose" : "chosen");
  $("rcard").querySelector(`[data-s="${s}"]`).classList.add(res === "w" ? "lose" : res === "l" ? "win" : "chosen");
  results.push(res);
  score[res === "w" ? 0 : res === "l" ? 1 : 2]++;
  renderDots();
  if (res === "w") {
    bump("sw", score[0]); flash("GOAL! ⚽", "goal"); confetti();
  } else if (res === "l") {
    bump("sl", score[1]); flash(`${N[rivalCardIdx][0].toUpperCase()} SCORES`, "bad");
    document.body.classList.add("shake"); setTimeout(() => document.body.classList.remove("shake"), 450);
  } else {
    flash("OFF THE POST! 🥅", "meh");
  }
  rivalHand = rivalHand.filter(x => x !== rivalCardIdx);
  myHand = myHand.filter(x => x !== myCardIdx);
  if (sudden && res !== "t") { setTimeout(endDuel, 1500); return; }
  if (sudden) { round = REGULATION + 1; } // golden-goal tie: redraw fresh cards
  else round++;
  setTimeout(() => { busy = false; startRound(); }, 1600);
}

function bump(id, v) {
  const el = $(id); el.textContent = v;
  el.classList.add("bump"); setTimeout(() => el.classList.remove("bump"), 350);
}

function flash(txt, cls) {
  $("flashtxt").textContent = txt;
  $("flashtxt").className = cls;
  $("flash").classList.add("show");
  setTimeout(() => $("flash").classList.remove("show"), 1150);
}

function confetti() {
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const EMO = ["⚽","🎉","⭐","🟡","🟢"];
  for (let i = 0; i < 16; i++) {
    const el = document.createElement("span");
    el.className = "conf";
    el.textContent = EMO[i % EMO.length];
    el.style.left = (5 + Math.random()*90) + "vw";
    document.body.appendChild(el);
    el.animate(
      [{ transform: "translateY(0) rotate(0)" },
       { transform: `translateY(105vh) rotate(${(Math.random()*2-1)*540}deg)` }],
      { duration: 900 + Math.random()*800, delay: Math.random()*250, easing: "cubic-bezier(.3,.4,.6,1)" }
    ).onfinish = () => el.remove();
  }
}

function endDuel() {
  const [w, l] = score, win = w > l;
  $("endemoji").textContent = win ? "🏆" : "😭";
  $("endtitle").textContent = win ? "YOU WIN THE DUEL" : "DUEL LOST";
  $("endline").textContent = `${w} – ${l}`;
  $("endsub").textContent = (sudden ? "Decided by a golden goal. " : "") + (score[2] ? `${score[2]} hit the post. ` : "") + (win ? "Run it back?" : "Revenge?");
  $("end").classList.add("show");
}

$("again").addEventListener("click", deal);
deal();
</script>
