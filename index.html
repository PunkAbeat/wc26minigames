<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MATCHDAY ⚽ World Cup 2026 daily mini games</title>
<meta name="description" content="A series of daily, shareable mini games for the 2026 World Cup. One stadium, many games — new kickoff every day." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch1:#2fb955; --pitch2:#1d9243;
    --bg1:#0a5230; --bg2:#053a22;
    --ink:#06321c; --txt:#fff; --soft:#e6fff0; --mut:#bfead0;
    --gold:#ffd23f; --gold-d:#e0a400; --goldink:#4a3500;
    --coral:#ff6b3d; --coral-d:#d8431a;
    --r:16px; --r-lg:24px; --r-sm:12px; --pill:999px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--bg2)} /* over-scroll shows pitch green, never white */
  /* overflow-x:clip (NOT hidden): hidden on html+body re-roots the scroll container and
     breaks wheel scrolling in some browsers; clip just clips. pan-y suppresses double-tap
     zoom + stray horizontal pan; overscroll-behavior kills the rubber-band bounce */
  html,body{margin:0;padding:0;overflow-x:clip;touch-action:pan-y;overscroll-behavior:none}
  body{
    font-family:'Nunito',system-ui,sans-serif; color:var(--txt);
    min-height:100vh; padding:0 16px 60px; display:flex; flex-direction:column; align-items:center;
    background:
      radial-gradient(700px 360px at 50% -60px, rgba(255,226,140,.30), transparent 65%),
      radial-gradient(1200px 700px at 50% 120%, rgba(0,0,0,.45), transparent 60%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    background-attachment:fixed;
  }
  .disp{font-family:'Baloo 2',cursive}

  .bunting{width:100%;max-width:560px;display:flex;justify-content:center;margin-top:4px;filter:drop-shadow(0 4px 3px rgba(0,0,0,.25))}
  .bunting i{width:30px;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:24px solid;
    transform-origin:top center;animation:sway 3.2s ease-in-out infinite}
  .bunting i:nth-child(even){animation-delay:.4s}
  @keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

  header{width:100%;max-width:560px;text-align:center;margin-top:16px}
  .kicker{font-size:11px;font-weight:800;letter-spacing:.3em;color:var(--gold);text-transform:uppercase}
  .wordmark{font-size:52px;font-weight:800;line-height:1;margin:8px 0 0;display:inline-flex;align-items:center;gap:14px;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.18)}
  .wordmark .ball{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#fff,#ffe9a6 42%,var(--gold) 74%,var(--gold-d));
    box-shadow:0 5px 14px -4px var(--gold-d), inset 0 -3px 6px rgba(0,0,0,.18);animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-4px) rotate(12deg)}}
  .sub{color:var(--mut);font-size:15px;font-weight:700;margin-top:10px;line-height:1.5}
  .scoreboard{display:inline-flex;align-items:center;gap:9px;margin-top:14px;background:var(--ink);border:2px solid rgba(255,255,255,.14);
    border-radius:var(--pill);padding:8px 18px;font-family:'Baloo 2';font-weight:700;font-size:13px;letter-spacing:.14em;color:var(--gold);box-shadow:0 6px 16px -8px rgba(0,0,0,.6)}
  .scoreboard .live{width:8px;height:8px;border-radius:50%;background:var(--coral);box-shadow:0 0 8px var(--coral);animation:blink 1.4s infinite}
  @keyframes blink{50%{opacity:.35}}

  /* fixtures = game cards */
  .fixtures{width:100%;max-width:560px;display:flex;flex-direction:column;gap:16px;margin-top:24px}
  @media (min-width:760px){
    .fixtures{max-width:760px;display:grid;grid-template-columns:1fr 1fr;align-items:stretch}
    .gamecard.live{grid-column:1 / -1}
  }

  .gamecard{position:relative;display:block;text-decoration:none;color:var(--txt);border-radius:var(--r-lg);overflow:hidden;
    background:linear-gradient(168deg,var(--pitch1),var(--pitch2));border:1px solid rgba(255,255,255,.18);
    box-shadow:0 24px 50px -20px rgba(0,0,0,.7), inset 0 2px 0 rgba(255,255,255,.25);
    animation:rise .55s cubic-bezier(.34,1.56,.64,1) both;
    transition:transform .15s ease, box-shadow .15s ease}
  .gamecard::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;background:repeating-linear-gradient(115deg, rgba(255,255,255,.05) 0 40px, transparent 40px 80px)}
  .gamecard .markings{position:absolute;inset:10px;border:2.5px solid rgba(255,255,255,.22);border-radius:14px;pointer-events:none}
  @keyframes rise{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
  .gamecard.live:hover{transform:translateY(-3px);box-shadow:0 30px 56px -20px rgba(0,0,0,.8), inset 0 2px 0 rgba(255,255,255,.25)}
  .gamecard.live:active{transform:translateY(1px)}

  .gc-pad{position:relative;z-index:2;padding:20px 20px 22px;display:flex;align-items:center;gap:16px;height:100%}
  .gc-icon{flex:none;width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;
    background:rgba(0,0,0,.22);border:2px solid rgba(255,255,255,.25);box-shadow:inset 0 2px 6px rgba(0,0,0,.3)}
  .gc-body{flex:1;min-width:0}
  .gc-name{font-family:'Baloo 2';font-weight:800;font-size:24px;line-height:1.05;text-shadow:0 2px 0 rgba(0,0,0,.15)}
  .gc-tag{color:var(--soft);font-size:13px;font-weight:700;margin-top:4px;line-height:1.45}
  .gc-badge{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-family:'Baloo 2';font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    background:var(--ink);border:2px solid rgba(255,255,255,.14);color:var(--gold);border-radius:var(--pill);padding:4px 11px}
  .gc-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);box-shadow:0 0 7px var(--coral);animation:blink 1.4s infinite}
  .gc-cta{flex:none;border-radius:var(--r);padding:13px 20px;font-family:'Baloo 2';font-weight:800;font-size:15px;letter-spacing:.04em;color:var(--goldink);
    background:linear-gradient(180deg,#ffe06b,var(--gold));box-shadow:0 6px 0 var(--gold-d),0 12px 18px -8px rgba(0,0,0,.45),inset 0 2px 2px rgba(255,255,255,.6);
    transition:transform .09s, box-shadow .09s}
  .gamecard.live:active .gc-cta{transform:translateY(5px);box-shadow:0 1px 0 var(--gold-d),0 5px 10px -8px rgba(0,0,0,.45),inset 0 2px 2px rgba(255,255,255,.6)}

  .gamecard.soon{cursor:default;background:linear-gradient(168deg,#1d6e3e,#155330)}
  .gamecard.soon .gc-icon{filter:grayscale(.4);opacity:.85}
  .gamecard.soon .gc-name{opacity:.92}
  .gamecard.soon .gc-badge{color:var(--mut)}
  .gamecard.soon .gc-badge .dot{background:#8fb89e;box-shadow:none;animation:none}
  .gc-lock{flex:none;font-size:22px;opacity:.7}

  .foot{max-width:560px;color:var(--mut);font-size:11px;font-weight:700;text-align:center;margin-top:26px;line-height:1.7;opacity:.85}
  .foot a{color:var(--soft)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="bunting" id="bunting"></div>

<header>
  <div class="kicker">World Cup 2026 · USA · Canada · Mexico</div>
  <div class="wordmark disp"><span class="ball"></span>MATCHDAY</div>
  <div class="sub">Daily mini games for the World Cup.<br>One stadium, many games — new kickoff every day.</div>
  <div class="scoreboard"><span class="live"></span><span id="countdown">KICKOFF SOON</span></div>
</header>

<main class="fixtures" id="fixtures"></main>

<div class="foot">
  Unofficial fan project · not affiliated with FIFA.<br>
  Anthem audio: public-domain recordings by the U.S. Navy Band via archive.org.
</div>

<script>
/* ===================== GAMES MANIFEST =====================
   Add a game: drop its folder in games/<id>/ with its own index.html,
   then add an entry here. status: "live" | "soon".              */
const GAMES=[
  {
    id:"anthem",
    name:"ANTHEM",
    icon:"🎺",
    tagline:"Hear a snippet of a national anthem, guess the nation in six tries.",
    status:"live",
    badge:"Daily · Play now",
    href:"games/anthem/index.html"
  },
  { id:"tba-1", name:"???", icon:"🥅", tagline:"Next fixture being scheduled…", status:"soon", badge:"Coming soon" },
  { id:"tba-2", name:"???", icon:"🏆", tagline:"Next fixture being scheduled…", status:"soon", badge:"Coming soon" }
];

/* ===================== RENDER ===================== */
const fx=document.getElementById("fixtures");
GAMES.forEach((g,i)=>{
  const live=g.status==="live";
  const el=document.createElement(live?"a":"div");
  el.className="gamecard "+g.status;
  el.style.animationDelay=(0.08*i)+"s";
  if(live){el.href=g.href;el.setAttribute("aria-label","Play "+g.name);}
  el.innerHTML=
    '<div class="markings"></div>'+
    '<div class="gc-pad">'+
      '<div class="gc-icon">'+g.icon+'</div>'+
      '<div class="gc-body">'+
        '<div class="gc-name disp">'+g.name+'</div>'+
        '<div class="gc-tag">'+g.tagline+'</div>'+
        '<div class="gc-badge">'+(live?'<span class="dot"></span>':'<span class="dot"></span>')+g.badge+'</div>'+
      '</div>'+
      (live?'<div class="gc-cta disp">PLAY</div>':'<div class="gc-lock">🔒</div>')+
    '</div>';
  fx.appendChild(el);
});

/* ===================== BUNTING ===================== */
const COLS=["#ffd23f","#ff6b3d","#ffffff","#2fb955"];
const bun=document.getElementById("bunting");
for(let i=0;i<12;i++){const f=document.createElement("i");f.style.borderTopColor=COLS[i%COLS.length];bun.appendChild(f);}

/* ===================== KICKOFF COUNTDOWN =====================
   WC26: 11 Jun – 19 Jul 2026. Before: countdown. During: live. After: full time. */
const KICKOFF=new Date("2026-06-11T00:00:00");
const FULLTIME=new Date("2026-07-20T00:00:00");
const cdEl=document.getElementById("countdown");
function tickCountdown(){
  const now=new Date();
  if(now>=FULLTIME){cdEl.textContent="FULL TIME · SEE YOU IN 2030";return;}
  if(now>=KICKOFF){
    const day=Math.floor((now-KICKOFF)/86400000)+1;
    cdEl.textContent="TOURNAMENT LIVE · DAY "+day;return;
  }
  const ms=KICKOFF-now;
  const d=Math.floor(ms/86400000), h=Math.floor(ms/3600000)%24, m=Math.floor(ms/60000)%60;
  cdEl.textContent="KICKOFF IN "+(d>0?d+"D ":"")+h+"H "+m+"M";
}
tickCountdown();setInterval(tickCountdown,30000);
</script>
</body>
</html>
